# nginx configuration for KSE NMT Simulator
# Place this file at: /etc/nginx/sites-available/kse-nmt
# Then: sudo ln -s /etc/nginx/sites-available/kse-nmt /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name kse-nmt.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    server_name kse-nmt.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/kse-nmt.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kse-nmt.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Max upload size (for question images and CSV)
    client_max_body_size 50M;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Pass SEB headers through
        proxy_set_header X-SafeExamBrowser-RequestHash $http_x_safeexambrowser_requesthash;
        proxy_set_header X-SafeExamBrowser-ConfigKeyHash $http_x_safeexambrowser_configkeyhash;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static uploads — serve directly for better performance
    location /uploads/ {
        alias /var/lib/kse-nmt/data/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
}
